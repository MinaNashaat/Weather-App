# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx2048m

# Force Kotlin to compile within the Gradle process to avoid daemon connection issues
kotlin.compiler.execution.strategy=in-process

# Increase timeouts for daemon connections
org.gradle.daemon.idletimeout=60000

android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Allow using kotlin.sourceSets DSL which is sometimes used by plugins like KSP
android.disallowKotlinSourceSets=false
